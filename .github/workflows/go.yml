# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Integração Contínua

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:

  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go_version: ['1.17', '1.18', '1.22']
        os: ['ubuntu-latest', 'ubuntu-22.04']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go_version }}

      - name: Inicia banco
        run: docker compose up -d postgres

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.54.2
          args: controllers/ database/ models/ routes/

      - name: Test
        run: DB_HOST=${{ secrets.DB_HOST }} DB_PASSWORD=${{ secrets.DB_PASSWORD }} DB_USER=${{ secrets.DB_USER }} DB_NAME=${{ secrets.DB_NAME }} DB_PORT=${{ secrets.DB_PORT }} go test -v main_test.go

  docker:
    needs: ci
    uses: ./.github/workflows/Docker.yml
    secrets: inherit